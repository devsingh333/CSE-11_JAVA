<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSE11 Bootstrap</title>  
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
</head>
<body> 
    <div class="container">
        <img src="https://cdn.pixabay.com/photo/2022/12/01/14/46/city-buildings-7629245_640.jpg" alt="CSE Logo" class="img-fluid">

        <h1>Bootstrap Heading</h1>
        <p class="lead">This is a lead paragraph for prominent image</p>
        <button type="button" class="btn btn-primary">Primary Button</button>
        <button type="button" class="btn btn-outline-secondary btn-sm">Small Outline Button</button>


        <button type="button" class="btn btn-success primary">
            Notificayion <span class="badge bg-secondary">2</span>
            <span class="badge bg danger">5</span>
        </button>

        <button type="button" class="btn btn-primary">
            <span class="badge bg-primary">Primary</span>
        </button>
        <button type="button" class="btn btn-secondary">
            <span class="badge bg-secondary">Secondary</span>
        </button>
        <button type="button" class="btn btn-success">
            <span class="badge bg-success">Success</span>
        </button>
        <button type="button" class="btn btn-danger">
            <span class="badge bg-danger">Danger</span>
        </button>
        <button type="button" class="btn btn-warning text-dark">
            <span class="badge bg-warning text-dark">Warning</span>
        </button>
        <button type="button" class="btn btn-info text-dark">
            <span class="badge bg-info text-dark">Info</span>
        </button>
        <button type="button" class="btn btn-light text-dark">
            <span class="badge bg-light text-dark">Light</span>
        </button>
        <button type="button" class="btn btn-dark">
            <span class="badge bg-dark">Dark</span>
        </button>

        <div id ="carouselExampleSlidesonly" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="container">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-3">Column 1</div>
            <div class="col-12 col-md-6 col-lg-3">Column 2</div>
            <div class="col-12 col-md-6 col-lg-3">Column 3</div>
            <div class="col-12 col-md-6 col-lg-3">Column 4</div>
        </div>
        </div>
                <div class="carousel-item active">
                    <img src="https://cdn.pixabay.com/photo/2022/12/01/14/46/city-buildings-7629245_1280.jpg" class="d-block w-100" alt="Slide 1">
                </div>
                <div class="carousel-item">
                    <img src="https://cdn.pixabay.com/photo/2023/02/09/16/36/bridge-7779222_1280.jpg" class="d-block w-100" alt="Slide 2">
                </div>

            </div>
        </div>

    </div>


</body>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</html>
